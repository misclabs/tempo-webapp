name: Check formatting, lint rules, and types

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: "test"
  cancel-in-progress: true

env:
  BUILD_PATH: "."

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # checkout v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Get Node.js version
        id: get-node-version
        run: |
          if [ -f "${{ env.BUILD_PATH }}/.node-version" ]; then
            echo NODE_VERSION=`cat "${{ env.BUILD_PATH }}/.node-version"` >> $GITHUB_ENV
          else
            echo Missing file: "${{ env.BUILD_PATH }}/.node-version"
            exit 1
          fi

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        # setup-node v6.2.0
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.BUILD_PATH }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.BUILD_PATH }}

      - name: Format check
        run: npm run format:check
        working-directory: ${{ env.BUILD_PATH }}

      - name: Linting
        run: npm run lint
        working-directory: ${{ env.BUILD_PATH }}

      - name: Unit tests
        run: npm run test
        working-directory: ${{ env.BUILD_PATH }}
